backend:
  name: git-gateway
  branch: main

media_folder: images

collections:
  - name: posts
    label: المقالات
    folder: posts
    create: true
    fields:
      - { label: "Title", name: title, widget: string }
      - { label: "Title Arabic", name: title_ar, widget: string }
      - { label: "Category", name: category, widget: string }
      - { label: "Content", name: body, widget: markdown }
      - { label: "Date", name: date, widget: datetime }
